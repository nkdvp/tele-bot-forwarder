admins:
  - 123456789  # Replace with your Telegram user ID

masking:
  users: {}    # Global masking defaults: user_id -> {alias: "Name"} or {alias: null}

pairs:
  - name: "example-pair"
    group_a_chat_id: -1001111111111
    group_b_chat_id: -1002222222222
    bidirectional: true
    enabled: true
    filters:
      types:
        allow:
          - text
          - photo
          - video
          - sticker
          - document
          - voice
          - animation
      keywords:
        block: []
        allow: []
    masking:
      a_to_b: {}
      b_to_a: {}
